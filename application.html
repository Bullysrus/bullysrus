<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Puppy Application | Bullys R Us</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>Bullys R Us</h1>

<nav>
<a href="index.html">Home</a>
<a href="index.html#dogs">Our Females</a>
<a href="index.html#studs">Studs</a>
<a href="index.html#puppies">Puppies</a>
</nav>

</header>


<section class="application">

<h2>Puppy Application</h2>

<p>
Thank you for your interest in a Bullys R Us puppy. 
Please fill out the application below so we can learn more about you and help match you with the perfect puppy.
</p>


<form action="https://formsubmit.co/fluffylovers23@gmail.com" method="POST">

<label>Name</label>
<input type="text" name="name" required>


<label>Email</label>
<input type="email" name="email" required>


<label>Phone Number</label>
<input type="text" name="phone">


<label>Where are you located?</label>
<input type="text" name="location">


<label>Have you owned a French Bulldog before?</label>
<textarea name="experience"></textarea>


<label>Tell us about your home and lifestyle</label>
<textarea name="lifestyle"></textarea>


<label>Do you have other pets?</label>
<textarea name="pets"></textarea>


<label>Are you looking for a pet or breeding prospect?</label>
<textarea name="goals"></textarea>


<label>Anything else you'd like us to know?</label>
<textarea name="message"></textarea>


<button class="gold-button" type="submit">
Submit Application
</button>


</form>

</section>


<footer>
© Bullys R Us
</footer>


</body>

</html>
